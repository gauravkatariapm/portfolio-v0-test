<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gaurav</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f5;
    --text: #0a0a0a;
    --muted: #6e6e6e;
    --icon: #b0b0b0;
    --icon-hover: #0a0a0a;
    --image-bg: #ffffff;
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --text: #f5f5f5;
    --muted: #a0a0a0;
    --icon: #6e6e6e;
    --icon-hover: #f5f5f5;
    --image-bg: #1a1a1a;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  /* ── Two-column layout ── */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 100vh;
  }

  /* ── Left panel ── */
  .left {
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
  }

  .intro {
    margin-top: 60px;
  }

  .intro h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 6px;
    color: var(--text);
  }

  .intro p {
    font-size: 18px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.4;
    letter-spacing: -0.3px;
  }

  /* ── Right panel (empty for now) ── */
  .right {
    position: relative;
  }

  /* ── Profile chip — top right ── */
  .profile-chip {
    position: fixed;
    top: 22px;
    right: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .profile-chip span {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
  }

  .profile-chip img {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    object-fit: cover;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    border: 1px solid rgba(128,128,128,0.2);
  }

  /* ── Footer — bottom right ── */
  .footer {
    position: fixed;
    bottom: 22px;
    right: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .theme-toggle {
    display: flex;
    gap: 2px;
    align-items: center;
    border-right: 1px solid rgba(128,128,128,0.25);
    padding-right: 14px;
  }

  .theme-toggle button {
    background: transparent;
    border: none;
    color: var(--icon);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease;
  }

  .theme-toggle button:hover { color: var(--icon-hover); }
  .theme-toggle button.active { color: var(--text); }
  .theme-toggle svg { width: 13px; height: 13px; }

  .footer a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s ease;
  }

  .footer a:hover { color: var(--text); }
</style>
</head>
<body>

  <!-- Profile chip — top right -->
  <div class="profile-chip">
    <span>Profile</span>
    <img src="profile.jpg" alt="Gaurav" id="profileImg" />
  </div>

  <div class="layout">
    <!-- Left: intro -->
    <div class="left">
      <section class="intro">
        <h1>Gaurav</h1>
        <p>Product Manager & AI Researcher</p>
      </section>
    </div>

    <!-- Right: demo area (empty for now) -->
    <div class="right"></div>
  </div>

  <!-- Footer: theme toggle + links -->
  <footer class="footer">
    <div class="theme-toggle" role="group" aria-label="Theme">
      <button id="theme-system" aria-label="System theme" title="System">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </button>
      <button id="theme-light" aria-label="Light theme" title="Light">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
          <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
          <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
        </svg>
      </button>
      <button id="theme-dark" aria-label="Dark theme" title="Dark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
    <a href="mailto:gaurav.kataria.pm@gmail.com">Email</a>
    <a href="https://x.com/10xkat" target="_blank" rel="noopener">Twitter</a>
  </footer>

  <script>
    // ── Rounded favicon ──
    function setRoundedFavicon(src) {
      const size = 64, radius = 16;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        ctx.clearRect(0, 0, size, size);
        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.lineTo(size - radius, 0);
        ctx.quadraticCurveTo(size, 0, size, radius);
        ctx.lineTo(size, size - radius);
        ctx.quadraticCurveTo(size, size, size - radius, size);
        ctx.lineTo(radius, size);
        ctx.quadraticCurveTo(0, size, 0, size - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, 0, 0, size, size);
        let link = document.querySelector("link[rel~='icon']");
        if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
        link.href = canvas.toDataURL('image/png');
      };
      img.src = src;
    }
    window.addEventListener('load', () => setRoundedFavicon('profile.jpg'));

    // ── Theme toggle ──
    const root = document.documentElement;
    const buttons = {
      system: document.getElementById('theme-system'),
      light: document.getElementById('theme-light'),
      dark: document.getElementById('theme-dark'),
    };
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme(mode) {
      root.setAttribute('data-theme', mode === 'system' ? (mediaQuery.matches ? 'dark' : 'light') : mode);
      Object.entries(buttons).forEach(([key, btn]) => btn.classList.toggle('active', key === mode));
      try { localStorage.setItem('theme', mode); } catch (e) {}
    }

    let saved = 'system';
    try { saved = localStorage.getItem('theme') || 'system'; } catch (e) {}
    applyTheme(saved);

    mediaQuery.addEventListener('change', () => {
      let current = 'system';
      try { current = localStorage.getItem('theme') || 'system'; } catch (e) {}
      if (current === 'system') applyTheme('system');
    });

    buttons.system.addEventListener('click', () => applyTheme('system'));
    buttons.light.addEventListener('click', () => applyTheme('light'));
    buttons.dark.addEventListener('click', () => applyTheme('dark'));
  </script>
</body>
</html>
