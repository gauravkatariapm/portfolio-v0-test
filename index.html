<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gaurav — Product Manager & AI Researcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f5;
    --text: #111;
    --muted: #9a9a9a;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .container {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 80px;
  }

  .intro h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 14px;
  }

  .intro p {
    font-size: 22px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.4;
    letter-spacing: -0.3px;
  }

  .image-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .profile-img {
    width: 400px;
    height: 400px;
    object-fit: cover;
    border-radius: 16px;
    display: block;
    /* Keep pixel art crisp instead of blurry when scaled */
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  .footer {
    position: fixed;
    bottom: 24px;
    right: 32px;
    display: flex;
    gap: 20px;
    font-size: 14px;
    color: var(--muted);
  }

  .footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .footer a:hover { color: var(--text); }

  @media (max-width: 900px) {
    body { padding: 24px; }
    .container {
      grid-template-columns: 1fr;
      gap: 40px;
    }
    .intro h1 { font-size: 26px; }
    .intro p { font-size: 18px; }
    .profile-img { width: 320px; height: 320px; }
    .footer {
      position: static;
      justify-content: center;
      margin-top: 40px;
    }
  }
</style>
</head>
<body>
  <main class="container">
    <section class="intro">
      <h1>Hi, I'm Gaurav</h1>
      <p>Product Manager & AI Researcher</p>
    </section>

    <section class="image-wrapper">
      <img src="profile.jpg" alt="Gaurav" class="profile-img" />
    </section>
  </main>

  <footer class="footer">
    <a href="mailto:hello@example.com">Email</a>
    <a href="#" target="_blank" rel="noopener">Twitter</a>
    <a href="#" target="_blank" rel="noopener">LinkedIn</a>
  </footer>
</body>
</html>
