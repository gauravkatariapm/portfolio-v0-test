<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gaurav</title>
<!-- Favicon generated with rounded corners via JS below -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f5f5;
    --text: #0a0a0a;
    --muted: #6e6e6e;
    --icon: #b0b0b0;
    --icon-hover: #0a0a0a;
    --image-bg: #ffffff;
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --text: #f5f5f5;
    --muted: #a0a0a0;
    --icon: #6e6e6e;
    --icon-hover: #f5f5f5;
    --image-bg: #1a1a1a;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .container {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 80px;
  }

  .intro h1 {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1.2px;
    line-height: 1.1;
    margin-bottom: 12px;
    color: var(--text);
  }

  .intro p {
    font-size: 28px;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.3;
    letter-spacing: -0.6px;
  }

  .image-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .profile-img {
    width: 400px;
    height: 400px;
    object-fit: cover;
    border-radius: 16px;
    background: var(--image-bg);
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    transition: background-color 0.2s ease;
  }

  .theme-toggle {
    position: fixed;
    bottom: 24px;
    left: 32px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .theme-toggle button {
    background: transparent;
    border: none;
    color: var(--icon);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease;
  }

  .theme-toggle button:hover { color: var(--icon-hover); }
  .theme-toggle button.active { color: var(--text); }
  .theme-toggle svg { width: 16px; height: 16px; }

  .footer {
    position: fixed;
    bottom: 24px;
    right: 32px;
    display: flex;
    gap: 20px;
    font-size: 14px;
  }

  .footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .footer a:hover { color: var(--text); }

  @media (max-width: 900px) {
    body { padding: 24px; padding-bottom: 80px; }
    .container { grid-template-columns: 1fr; gap: 40px; }
    .intro h1 { font-size: 32px; }
    .intro p { font-size: 20px; }
    .profile-img { width: 320px; height: 320px; }
    .theme-toggle { left: 24px; bottom: 16px; }
    .footer { right: 24px; bottom: 16px; gap: 14px; font-size: 13px; }
  }
</style>
</head>
<body>
  <main class="container">
    <section class="intro">
      <h1>Hi, I'm Gaurav</h1>
      <p>Product Manager & AI Researcher</p>
    </section>

    <section class="image-wrapper">
      <img src="profile.jpg" alt="Gaurav" class="profile-img" id="profileImg" />
    </section>
  </main>

  <div class="theme-toggle" role="group" aria-label="Theme">
    <button id="theme-system" aria-label="System theme" title="System">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </button>
    <button id="theme-light" aria-label="Light theme" title="Light">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
        <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
        <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
      </svg>
    </button>
    <button id="theme-dark" aria-label="Dark theme" title="Dark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>

  <footer class="footer">
    <a href="mailto:hello@example.com">Email</a>
    <a href="#" target="_blank" rel="noopener">Twitter</a>
    <a href="#" target="_blank" rel="noopener">LinkedIn</a>
  </footer>

  <script>
    // ── Rounded favicon from profile.jpg ──
    function setRoundedFavicon(src) {
      const size = 64;
      const radius = 16;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        ctx.clearRect(0, 0, size, size);
        // Rounded rect clip
        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.lineTo(size - radius, 0);
        ctx.quadraticCurveTo(size, 0, size, radius);
        ctx.lineTo(size, size - radius);
        ctx.quadraticCurveTo(size, size, size - radius, size);
        ctx.lineTo(radius, size);
        ctx.quadraticCurveTo(0, size, 0, size - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, 0, 0, size, size);
        // Set favicon
        let link = document.querySelector("link[rel~='icon']");
        if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
        link.href = canvas.toDataURL('image/png');
      };
      img.src = src;
    }

    window.addEventListener('load', () => setRoundedFavicon('profile.jpg'));

    // ── Theme toggle ──
    const root = document.documentElement;
    const buttons = {
      system: document.getElementById('theme-system'),
      light: document.getElementById('theme-light'),
      dark: document.getElementById('theme-dark'),
    };
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

    function applyTheme(mode) {
      root.setAttribute('data-theme', mode === 'system' ? (mediaQuery.matches ? 'dark' : 'light') : mode);
      Object.entries(buttons).forEach(([key, btn]) => btn.classList.toggle('active', key === mode));
      try { localStorage.setItem('theme', mode); } catch (e) {}
    }

    let saved = 'system';
    try { saved = localStorage.getItem('theme') || 'system'; } catch (e) {}
    applyTheme(saved);

    mediaQuery.addEventListener('change', () => {
      let current = 'system';
      try { current = localStorage.getItem('theme') || 'system'; } catch (e) {}
      if (current === 'system') applyTheme('system');
    });

    buttons.system.addEventListener('click', () => applyTheme('system'));
    buttons.light.addEventListener('click', () => applyTheme('light'));
    buttons.dark.addEventListener('click', () => applyTheme('dark'));
  </script>
</body>
</html>
